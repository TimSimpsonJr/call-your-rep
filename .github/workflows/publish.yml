name: Publish npm Packages

on:
  schedule:
    # Weekly Friday 6pm ET (23:00 UTC)
    - cron: '0 23 * * 5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if data changed since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --quiet "$LAST_TAG" -- data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.check.outputs.changed == 'true'
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          # Sync boundaries version
          node -e "const p=require('./boundaries-package.json'); p.version='$VERSION'; require('fs').writeFileSync('boundaries-package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish call-your-rep
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish call-your-rep-boundaries
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Temporarily swap package.json for boundaries publish
          cp package.json package.json.bak
          cp boundaries-package.json package.json
          npm publish --access public
          # Restore
          mv package.json.bak package.json

      - name: Commit version bump and tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json boundaries-package.json
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"
          git push && git push --tags
